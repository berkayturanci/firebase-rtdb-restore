name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (pinned 2026-05-30)

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.1.1 (pinned 2026-05-30)
      with:
        python-version: '3.12'

    - name: Install Ruff
      run: python -m pip install --upgrade pip ruff

    - name: Run Ruff
      run: ruff check .

  test:
    name: Run Python Unit Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (pinned 2026-05-30)

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.1.1 (pinned 2026-05-30)
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run test suite
      run: python3 -m unittest discover tests/ -p "test_*.py"

  package:
    name: Build and verify package
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (pinned 2026-05-30)

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.1.1 (pinned 2026-05-30)
      with:
        python-version: '3.12'

    - name: Build distribution artifacts
      run: |
        python -m pip install --upgrade pip build twine
        python -m build --sdist --wheel --outdir dist/
        python -m twine check dist/*

  docs-site:
    name: Check documentation site
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (pinned 2026-05-30)

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.1.1 (pinned 2026-05-30)
      with:
        python-version: '3.12'

    - name: Check release metadata on documentation site
      run: python scripts/check_docs_site.py
