name: Publish to PyPI & GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build, Publish to PyPI, and Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing on PyPI
      contents: write  # Required for actions/checkout and creating GitHub Releases with assets
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (pinned 2026-05-30)
    
    - name: Set up Python
      uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f  # v5.1.1 (pinned 2026-05-30)
      with:
        python-version: '3.10'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        
    - name: Build a binary wheel and a source tarball
      run: python -m build --sdist --wheel --outdir dist/

    - name: Verify package metadata
      run: |
        pip install twine
        twine check dist/*
      
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@81e9d935c883d0b210363ab89cf05f3894778450  # v1.8.14 (pinned 2026-05-30)
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true

    - name: Create GitHub Release and Upload Packages
      uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191  # v2.0.5 (pinned 2026-05-30)
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
