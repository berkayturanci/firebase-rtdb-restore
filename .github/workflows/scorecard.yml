name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "18 4 * * 1"  # weekly, Monday 04:18 UTC
  push:
    branches: [main]

# Least-privilege at the top level; the job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results to the OpenSSF API
      contents: read
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2 (pinned 2026-05-30)
      with:
        persist-credentials: false

    - name: Run analysis
      uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3 (pinned 2026-05-30)
      with:
        results_file: results.sarif
        results_format: sarif
        publish_results: true

    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2 (pinned 2026-05-30)
      with:
        name: SARIF file
        path: results.sarif
        retention-days: 5

    - name: Upload to code-scanning
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0 (pinned 2026-05-30)
      with:
        sarif_file: results.sarif
